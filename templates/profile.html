<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — SCREENCRAFT</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/index.css' %}">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/logo-black.svg' %}">
</head>
<body class="profile-page-view">

<nav>
  <div class="nav-inner">
    <div class="nav-logo">SCREENCRAFT</div>
    <button class="nav-cta" onclick="logout()">Logout</button>
  </div>
</nav>

<main class="profile-page">
  <div class="profile-wrap">

    <section>
      <div class="section-head">
        <h2 class="section-title" style="font-size:1.35rem;">My Projects</h2>
        <button id="createProjectBtn" class="action-btn primary" onclick="openCreateProjectModal(); return false;">Create Project</button>
      </div>
      <div id="projectsList" class="project-list">
        <div class="muted-empty">No projects yet. Create your first project to get started.</div>
      </div>
    </section>
  </div>
</main>

<div id="createProjectModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="createProjectTitle">
  <div class="profile-modal">
    <h3 id="createProjectTitle" class="modal-title">Create Project</h3>
    <p class="modal-text">Start from scratch with a new project.</p>
    <input id="projectNameInput" class="modal-input" type="text" maxlength="255" placeholder="Project name">
    <textarea id="projectDescInput" class="modal-textarea" placeholder="Project description (optional)"></textarea>
    <div class="modal-actions">
      <button id="projectModalCancel" class="action-btn">Cancel</button>
      <button id="projectModalCreate" class="action-btn primary">Create</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
  <div class="profile-modal">
    <h3 id="confirmTitle" class="modal-title">Confirm</h3>
    <p id="confirmMessage" class="modal-text"></p>
    <div class="modal-actions">
      <button id="confirmCancel" class="action-btn">Cancel</button>
      <button id="confirmOk" class="action-btn primary">Delete</button>
    </div>
  </div>
</div>

<div id="infoModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
  <div class="profile-modal">
    <h3 id="infoTitle" class="modal-title">Notice</h3>
    <p id="infoMessage" class="modal-text"></p>
    <div class="modal-actions">
      <button id="infoOk" class="action-btn primary">OK</button>
    </div>
  </div>
</div>

<script src="{% static 'js/index.js' %}"></script>

</body>
</html>
