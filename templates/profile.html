<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — SCREENCRAFT</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/index.css' %}">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/logo-black.svg' %}">
  <style>
    .profile-page {
      min-height: 100vh;
      padding: 7rem 2rem 2.5rem;
      background: #fff;
    }

    .profile-wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 1.4rem;
    }

    .profile-top {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .profile-panel {
      border: 1px solid var(--border);
      background: var(--offwhite);
      padding: 1.1rem;
    }

    .profile-label {
      font-size: 0.72rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray);
      margin-bottom: 0.5rem;
    }

    .profile-value {
      font-size: 1.05rem;
      color: var(--black);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .section-title {
      margin: 0;
      font-family: var(--font-display);
      letter-spacing: 0.02em;
      font-size: 1.6rem;
      text-transform: uppercase;
    }

    .project-list {
      border: 1px solid var(--border);
      background: #fff;
      min-height: 120px;
    }

    .project-item {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .project-item:last-child {
      border-bottom: none;
    }

    .project-name {
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .project-meta {
      font-size: 0.83rem;
      color: var(--gray);
    }

    .project-actions {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-shrink: 0;
    }

    .action-btn {
      border: 1px solid var(--border);
      padding: 0.55rem 0.9rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      background: #fff;
      color: var(--black);
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      border-color: var(--black);
    }

    .action-btn.primary {
      background: var(--black);
      color: #fff;
      border-color: var(--black);
    }

    .action-btn.primary:hover {
      background: #222;
      border-color: #222;
    }

    .muted-empty {
      text-align: center;
      color: var(--gray);
      padding: 2rem;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .overlay.visible {
      display: flex;
    }

    .profile-modal {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid var(--border);
      padding: 1.2rem;
    }

    .modal-title {
      margin: 0 0 0.8rem;
      font-family: var(--font-display);
      font-size: 1.8rem;
      text-transform: uppercase;
    }

    .modal-text {
      margin: 0 0 1rem;
      color: var(--gray);
      line-height: 1.6;
    }

    .modal-input,
    .modal-textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      padding: 0.72rem 0.8rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      margin-bottom: 0.7rem;
    }

    .modal-textarea {
      min-height: 92px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.55rem;
      margin-top: 0.4rem;
    }

    @media (max-width: 760px) {
      .profile-top {
        grid-template-columns: 1fr;
      }

      .project-item {
        flex-direction: column;
      }

      .project-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo">SCREENCRAFT</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/editor/">Editor</a></li>
    </ul>
    <button class="nav-cta" onclick="logout()">Logout</button>
  </div>
</nav>

<main class="profile-page">
  <div class="profile-wrap">
    <div class="section-head">
      <h1 class="section-title">Profile</h1>
      <div style="display:flex; gap:0.55rem;">
        <a href="/editor/" class="action-btn">Open Editor</a>
        <button class="action-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="profile-top">
      <div class="profile-panel">
        <div class="profile-label">Email</div>
        <div id="userEmail" class="profile-value">—</div>
      </div>
      <div class="profile-panel">
        <div class="profile-label">Full Name</div>
        <div id="userName" class="profile-value">—</div>
      </div>
    </div>

    <section>
      <div class="section-head">
        <h2 class="section-title" style="font-size:1.35rem;">My Projects</h2>
        <button id="createProjectBtn" class="action-btn primary" onclick="openCreateProjectModal(); return false;">Create Project</button>
      </div>
      <div id="projectsList" class="project-list">
        <div class="muted-empty">No projects yet. Create your first project to get started.</div>
      </div>
    </section>
  </div>
</main>

<div id="createProjectModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="createProjectTitle">
  <div class="profile-modal">
    <h3 id="createProjectTitle" class="modal-title">Create Project</h3>
    <p class="modal-text">Start from scratch with a new project.</p>
    <input id="projectNameInput" class="modal-input" type="text" maxlength="255" placeholder="Project name">
    <textarea id="projectDescInput" class="modal-textarea" placeholder="Project description (optional)"></textarea>
    <div class="modal-actions">
      <button id="projectModalCancel" class="action-btn">Cancel</button>
      <button id="projectModalCreate" class="action-btn primary">Create</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
  <div class="profile-modal">
    <h3 id="confirmTitle" class="modal-title">Confirm</h3>
    <p id="confirmMessage" class="modal-text"></p>
    <div class="modal-actions">
      <button id="confirmCancel" class="action-btn">Cancel</button>
      <button id="confirmOk" class="action-btn primary">Delete</button>
    </div>
  </div>
</div>

<div id="infoModal" class="overlay" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
  <div class="profile-modal">
    <h3 id="infoTitle" class="modal-title">Notice</h3>
    <p id="infoMessage" class="modal-text"></p>
    <div class="modal-actions">
      <button id="infoOk" class="action-btn primary">OK</button>
    </div>
  </div>
</div>

<script>
    let pendingDeleteProjectId = null;

    function showOverlay(id) {
      document.getElementById(id).classList.add('visible');
    }

    function hideOverlay(id) {
      document.getElementById(id).classList.remove('visible');
    }

    function showInfo(message, title = 'Notice') {
      document.getElementById('infoTitle').textContent = title;
      document.getElementById('infoMessage').textContent = message;
      showOverlay('infoModal');
    }

    function openCreateProjectModal() {
      document.getElementById('projectNameInput').value = 'Untitled Project';
      document.getElementById('projectDescInput').value = '';
      showOverlay('createProjectModal');
      document.getElementById('projectNameInput').focus();
      document.getElementById('projectNameInput').select();
    }

    // Create a new project
    async function createProject(name, description = "") {
      try {
        const response = await fetch('/api/projects/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({
            name: name || "Untitled Project",
            description: description || "",
            payload: { screenshots: [] }
          })
        });
      
        if (!response.ok) {
          showInfo('Failed to create project.', 'Error');
          return;
        }
      
        const project = await response.json();
        // Redirect to editor with project ID
        window.location.href = `/editor/?project=${project.id}`;
      } catch (error) {
        console.error('Error creating project:', error);
        showInfo('Could not create project.', 'Error');
      }
    }

    // Load and display user's projects
    async function loadProjects() {
      try {
        const response = await fetch('/api/projects/', {
          credentials: 'include'
        });
      
        if (!response.ok) {
          return;
        }
      
        const projects = await response.json();
        const projectsList = document.getElementById('projectsList');
      
        if (projects.length === 0) {
          projectsList.innerHTML = '<div class="muted-empty">No projects yet. Create your first project to get started.</div>';
          return;
        }
      
        projectsList.innerHTML = projects.map(project => `
          <div class="project-item">
            <div style="flex: 1; min-width:0;">
              <div class="project-name">${escapeHtml(project.name)}</div>
              <div class="project-meta">${escapeHtml(project.description) || 'No description'}</div>
              <div class="project-meta" style="margin-top: 0.4rem;">Updated ${formatDate(project.updated_at)}</div>
            </div>
            <div class="project-actions">
              <a href="/editor/?project=${project.id}" class="action-btn">Open</a>
              <button onclick="requestDeleteProject(${project.id})" class="action-btn">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading projects:', error);
      }
    }

    // Delete a project
    async function deleteProject(projectId) {
      try {
        const response = await fetch(`/api/projects/${projectId}/`, {
          method: 'DELETE',
          credentials: 'include'
        });
      
        if (!response.ok) {
          showInfo('Failed to delete project.', 'Error');
          return;
        }
      
        loadProjects();
      } catch (error) {
        console.error('Error deleting project:', error);
        showInfo('Could not delete project.', 'Error');
      }
    }

    function requestDeleteProject(projectId) {
      pendingDeleteProjectId = projectId;
      document.getElementById('confirmMessage').textContent = 'Are you sure you want to delete this project? This cannot be undone.';
      showOverlay('confirmModal');
    }

    // Helper function to escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Helper function to format date
    function formatDate(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);
    
      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
    
      return date.toLocaleDateString();
    }

    function bindProfileEvents() {
      const createBtn = document.getElementById('createProjectBtn');
      const projectModalCancel = document.getElementById('projectModalCancel');
      const projectModalCreate = document.getElementById('projectModalCreate');
      const confirmCancel = document.getElementById('confirmCancel');
      const confirmOk = document.getElementById('confirmOk');
      const infoOk = document.getElementById('infoOk');

      if (createBtn) createBtn.addEventListener('click', openCreateProjectModal);

      if (projectModalCancel) {
        projectModalCancel.addEventListener('click', () => hideOverlay('createProjectModal'));
      }

      if (projectModalCreate) {
        projectModalCreate.addEventListener('click', async () => {
          const name = document.getElementById('projectNameInput').value.trim();
          const description = document.getElementById('projectDescInput').value.trim();
          if (!name) {
            showInfo('Project name is required.', 'Validation');
            return;
          }
          hideOverlay('createProjectModal');
          await createProject(name, description);
        });
      }

      if (confirmCancel) {
        confirmCancel.addEventListener('click', () => {
          pendingDeleteProjectId = null;
          hideOverlay('confirmModal');
        });
      }

      if (confirmOk) {
        confirmOk.addEventListener('click', async () => {
          const id = pendingDeleteProjectId;
          pendingDeleteProjectId = null;
          hideOverlay('confirmModal');
          if (id !== null) {
            await deleteProject(id);
          }
        });
      }

      if (infoOk) infoOk.addEventListener('click', () => hideOverlay('infoModal'));

      ['createProjectModal', 'confirmModal', 'infoModal'].forEach((id) => {
        const modal = document.getElementById(id);
        if (!modal) return;
        modal.addEventListener('click', (e) => {
          if (e.target.id === id) {
            hideOverlay(id);
          }
        });
      });
    }

  // Fetch current user info
  async function loadProfile() {
    try {
      const response = await fetch('/api/auth/me/', {
        credentials: 'include'
      });
      
      if (!response.ok) {
        window.location.href = '/';
        return;
      }
      
      const user = await response.json();
      document.getElementById('userEmail').textContent = user.email || 'N/A';
      document.getElementById('userName').textContent = user.full_name || 'User';
      loadProjects();
    } catch (error) {
      console.error('Error loading profile:', error);
      window.location.href = '/';
    }
  }

  // Logout function
  async function logout() {
    try {
      await fetch('/api/auth/logout/', {
        method: 'POST',
        credentials: 'include'
      });
    } catch (error) {
      console.error('Logout error:', error);
    }
    window.location.href = '/';
  }

  // Load profile on page load
  document.addEventListener('DOMContentLoaded', () => {
    bindProfileEvents();
    loadProfile();
  });
</script>

</body>
</html>
